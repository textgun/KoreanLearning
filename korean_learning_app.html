<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국어 학습 도구</title>
<!-- Plus Jakarta Sans 및 Noto Sans KR 프리미엄 웹 폰트 적용 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --primary: #4f46e5;      /* Deep premium Indigo */
  --primary-dark: #3730a3;
  --primary-soft: #e0e7ff;  /* Soft lavender-indigo */
  --accent: #f59e0b;       /* Amber */
  --accent-soft: #fef3c7;
  --success: #10b981;      /* Emerald */
  --success-soft: #d1fae5;
  --danger: #f43f5e;       /* Rose Red */
  --danger-soft: #fee2e2;
  --bg: #fafafa;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --text: #0f172a;         /* Slate Black */
  --muted: #64748b;        /* Slate Grey */
  --border: rgba(226, 232, 240, 0.8);
  --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
  --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
  --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.06), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;

  /* 프리미엄 타이포그래피 토큰 시스템 */
  --font-primary: 'Plus Jakarta Sans', 'Noto Sans KR', "Segoe UI", system-ui, -apple-system, sans-serif;
  --font-title: 'Plus Jakarta Sans', 'Noto Sans KR', sans-serif;
}

body {
  min-height: 100vh;
  color: var(--text);
  background: radial-gradient(circle at 50% 0%, #eff6ff 0%, #faf5ff 50%, #f8fafc 100%);
  font-family: var(--font-primary);
  font-size: 16px;
  line-height: 1.6;
  letter-spacing: -0.01em;
  -webkit-font-smoothing: antialiased;
}

/* Lucide SVG icons styling */
i[data-lucide] {
  stroke-width: 2.25;
  color: var(--primary);
  display: inline-block;
  vertical-align: middle;
}

.card-icon {
  width: 48px;
  height: 48px;
  margin: 0 auto 12px;
  display: block;
  color: var(--primary);
  filter: drop-shadow(0 4px 8px rgba(79, 70, 229, 0.18));
}

#app {
  width: min(100%, 980px);
  min-height: 100vh;
  margin: 0 auto;
  padding: 18px;
}

.topbar {
  position: sticky;
  top: 12px;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  margin-bottom: 18px;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(226, 232, 240, 0.8);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.logo {
  color: var(--primary-dark);
  font-size: 1.15rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  white-space: nowrap;
}

.stats-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: flex-end;
  gap: 8px;
}

.stat-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  min-height: 34px;
  padding: 6px 12px;
  color: #344054;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 0.9rem;
  font-weight: 700;
}

.stat-chip.xp {
  color: #92400e;
  background: var(--accent-soft);
  border-color: #f5d48b;
}

.stat-chip.streak {
  color: #991b1b;
  background: var(--danger-soft);
  border-color: #fecaca;
}

.stat-chip.level {
  color: #1e40af;
  background: var(--primary-soft);
  border-color: #bfdbfe;
}

.stat-chip.lang {
  background: var(--surface);
  cursor: pointer;
}

.stat-chip.lang:hover {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
}

.panel,
.home-lang-panel {
  margin-bottom: 16px;
  padding: 26px;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(226, 232, 240, 0.8);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

h2 {
  margin-bottom: 16px;
  color: #0f172a;
  font-family: var(--font-title);
  font-size: 1.45rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.25;
}

h3 {
  margin-bottom: 12px;
  color: #1e293b;
  font-family: var(--font-title);
  font-size: 1.18rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.3;
}

.text-muted {
  color: var(--muted);
  font-size: 0.94rem;
  letter-spacing: -0.01em;
  line-height: 1.5;
}

.btn {
  min-height: 42px;
  padding: 10px 16px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.98rem;
  font-weight: 760;
  cursor: pointer;
  transition: background 0.16s, border-color 0.16s, box-shadow 0.16s, transform 0.16s;
}

.btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 8px 18px rgba(16, 24, 40, 0.10);
}

.btn:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible,
.lang-tile:focus-visible,
.mode-card:focus-visible,
.unit-tile:focus-visible,
.activity-tile:focus-visible,
.quiz-option:focus-visible,
.match-card:focus-visible,
.so-word:focus-visible,
.ox-btn:focus-visible {
  outline: 3px solid rgba(37, 99, 235, 0.24);
  outline-offset: 2px;
}

.btn:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.btn-primary {
  color: #fff;
  background: var(--primary);
}

.btn-primary:hover:not(:disabled) {
  background: var(--primary-dark);
}

.btn-accent {
  color: #7c2d12;
  background: var(--accent-soft);
  border-color: #fed7aa;
}

.btn-danger {
  color: #fff;
  background: var(--danger);
}

.btn-success {
  color: #fff;
  background: var(--success);
}

.btn-ghost {
  color: var(--primary-dark);
  background: transparent;
  border-color: var(--border);
}

.btn-ghost:hover:not(:disabled) {
  background: var(--primary-soft);
  border-color: #bfdbfe;
}

.btn-block {
  width: 100%;
}

.btn-lg {
  min-height: 52px;
  padding: 14px 20px;
  font-size: 1.05rem;
}

.btn-sm {
  min-height: 34px;
  padding: 7px 11px;
  font-size: 0.88rem;
}

.home-hero {
  padding: 34px 10px 24px;
  color: var(--text);
  text-align: center;
}

.home-hero h1 {
  margin-bottom: 8px;
  font-size: clamp(2rem, 7vw, 3.15rem);
  font-weight: 850;
  letter-spacing: 0;
}

.home-hero p {
  color: var(--muted);
  font-size: 1.05rem;
}

.home-lang-panel h3 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  font-size: 1.05rem;
}

.lang-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 8px;
}

.lang-tile {
  min-height: 88px;
  padding: 13px 10px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 700;
  transition: background 0.16s, border-color 0.16s, box-shadow 0.16s, transform 0.16s;
}

.lang-tile:hover {
  border-color: #93c5fd;
  box-shadow: var(--shadow-sm);
}

.lang-tile.active {
  color: #1e40af;
  background: var(--primary-soft);
  border-color: #93c5fd;
  box-shadow: inset 0 0 0 1px #93c5fd;
}

.lang-tile .flag {
  display: block;
  margin-bottom: 4px;
  font-size: 1.5rem;
}

.lang-tile .name {
  font-size: 0.9rem;
}

.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.mode-card {
  min-height: 210px;
  padding: 28px 22px;
  text-align: center;
  background: rgba(255, 255, 255, 0.8);
  border: 1px solid rgba(226, 232, 240, 0.8);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.mode-card:hover {
  border-color: rgba(79, 70, 229, 0.4);
  box-shadow: var(--shadow-md);
  transform: translateY(-4px);
}

.mode-card .icon {
  margin-bottom: 14px;
  font-size: 3.15rem;
}

.mode-card h3 {
  margin-bottom: 6px;
  font-size: 1.32rem;
}

.mode-card p {
  color: var(--muted);
  font-size: 0.98rem;
}

.unit-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.unit-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-left: 4px solid var(--primary);
  border-radius: var(--radius-md);
}

.unit-item h4 {
  margin-bottom: 4px;
  font-size: 1.08rem;
}

.unit-item .meta {
  color: var(--muted);
  font-size: 0.9rem;
}

.unit-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 6px;
}

.create-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}

.option-card {
  min-height: 150px;
  padding: 22px;
  text-align: center;
  background: var(--surface);
  border: 1.5px dashed #b8c2d1;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.16s, border-color 0.16s, box-shadow 0.16s;
}

.option-card:hover {
  background: #f9fbff;
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
}

.option-card .icon {
  margin-bottom: 10px;
  font-size: 2.55rem;
}

.option-card .label {
  font-size: 1.06rem;
  font-weight: 800;
}

.option-card .desc {
  margin-top: 6px;
  color: var(--muted);
  font-size: 0.94rem;
}

input[type="text"],
input[type="password"],
input[type="email"],
input[type="tel"],
input[type="number"],
input[type="file"],
select,
textarea {
  width: 100%;
  padding: 11px 13px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 1rem;
  outline: none;
  transition: border-color 0.16s, box-shadow 0.16s;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
}

textarea {
  min-height: 92px;
  resize: vertical;
  line-height: 1.55;
}

label {
  display: block;
  margin-bottom: 6px;
  color: #344054;
  font-size: 0.92rem;
  font-weight: 700;
}

.vocab-edit-item,
.grammar-edit-item,
.quiz-edit-item {
  margin-bottom: 10px;
  padding: 13px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
}

.vocab-edit-grid {
  display: grid;
  grid-template-columns: 76px 1.15fr 1fr 1fr auto;
  gap: 8px;
  align-items: center;
}

.student-grammar-panel {
  border-top: 3px solid var(--primary);
}

.student-grammar-card {
  margin-bottom: 10px;
  padding: 16px 18px;
  background: #f8fbff;
  border: 1px solid #cfe0f7;
  border-left: 4px solid var(--primary);
  border-radius: var(--radius-md);
}

.student-grammar-pattern {
  margin-bottom: 8px;
  color: var(--primary-dark);
  font-size: 1.18rem;
  font-weight: 850;
}

.student-grammar-explanation {
  margin-bottom: 10px;
  color: #344054;
  font-size: 1rem;
  line-height: 1.65;
}

.student-grammar-examples {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.student-grammar-example {
  padding: 9px 12px;
  background: var(--surface);
  border: 1px solid #e7edf5;
  border-radius: var(--radius-sm);
}

.student-grammar-example .ko {
  font-size: 1.03rem;
  font-weight: 760;
}

.student-grammar-example .trans {
  margin-top: 3px;
  color: var(--muted);
  font-size: 0.9rem;
}

.unit-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 12px;
}

.unit-tile {
  min-height: 170px;
  padding: 22px 18px;
  color: var(--text);
  text-align: center;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(226, 232, 240, 0.8);
  border-top: 4px solid var(--primary);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.unit-tile:hover {
  border-color: rgba(79, 70, 229, 0.4);
  box-shadow: var(--shadow-md);
  transform: translateY(-4px);
}

.unit-tile .num {
  color: var(--primary-dark);
  font-size: 2.2rem;
  font-weight: 900;
}

.unit-tile .title {
  margin-top: 8px;
  font-size: 1.03rem;
  font-weight: 760;
}

.unit-tile .progress {
  margin-top: 10px;
  color: var(--muted);
  font-size: 0.88rem;
}

.activity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 12px;
}

.activity-tile {
  min-height: 142px;
  padding: 18px 14px;
  text-align: center;
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(226, 232, 240, 0.8);
  border-radius: var(--radius-md);
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: border-color 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1), transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.activity-tile:hover {
  border-color: var(--primary);
  box-shadow: var(--shadow-md);
  transform: translateY(-4px);
}

.activity-tile .icon {
  margin-bottom: 8px;
  font-size: 2.25rem;
  display: flex;
  justify-content: center;
  align-items: center;
}

.activity-tile .icon i {
  width: 32px;
  height: 32px;
  color: var(--primary);
}

.activity-tile .name {
  font-size: 1rem;
  font-weight: 800;
}

.activity-tile .best {
  margin-top: 5px;
  color: var(--accent);
  font-size: 0.84rem;
  font-weight: 760;
}

.activity-tile.vocab {
  background: #f8fbff;
  border-color: #bfdbfe;
}

.activity-tile.grammar {
  background: #fdf7fb;
  border-color: #fbcfe8;
}

.activity-tile.pdfquiz {
  background: #fffaf0;
  border-color: #fde68a;
}

.activity-tile.disabled {
  pointer-events: none;
  opacity: 0.45;
}

.game-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 14px;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.game-progress {
  flex: 1;
  height: 8px;
  min-width: 80px;
  overflow: hidden;
  background: #e5eaf2;
  border-radius: 999px;
}

.game-progress-bar {
  height: 100%;
  background: var(--success);
  border-radius: inherit;
  transition: width 0.3s;
}

.game-info {
  color: #344054;
  font-size: 0.92rem;
  font-weight: 800;
  white-space: nowrap;
}

.combo-display {
  color: var(--accent);
  font-size: 1rem;
  font-weight: 850;
  animation: pulse 0.5s;
}

@keyframes pulse {
  0% { transform: scale(0.92); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.fc-area {
  height: 380px;
  margin-bottom: 16px;
  perspective: 1500px;
}

.fc-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.fc-area.flipped .fc-inner {
  transform: rotateY(180deg);
}

.fc-face {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 26px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.fc-back {
  color: #0f172a;
  background: #eff6ff;
  border-color: #bfdbfe;
  transform: rotateY(180deg);
}

.fc-emoji {
  margin-bottom: 16px;
  font-size: clamp(4.2rem, 16vw, 6rem);
}

.fc-word {
  font-size: clamp(1.8rem, 8vw, 2.45rem);
  font-weight: 900;
  letter-spacing: 0;
  text-align: center;
}

.fc-roman {
  margin-top: 6px;
  color: var(--muted);
  font-size: 1rem;
  font-style: italic;
  text-align: center;
}

.fc-back .fc-roman {
  color: #475467;
}

.fc-meaning {
  padding: 12px 18px;
  color: var(--primary-dark);
  background: var(--surface);
  border: 1px solid #bfdbfe;
  border-radius: var(--radius-md);
  font-size: clamp(1.24rem, 6vw, 1.65rem);
  font-weight: 850;
  text-align: center;
}

.fc-controls {
  display: flex;
  gap: 10px;
}

.fc-controls .btn {
  flex: 1;
}

.quiz-question {
  margin-bottom: 14px;
  padding: 28px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

.quiz-emoji {
  font-size: clamp(3.6rem, 14vw, 5rem);
}

.quiz-word {
  margin-top: 6px;
  font-size: clamp(1.7rem, 7vw, 2.2rem);
  font-weight: 900;
}

.quiz-prompt {
  margin-top: 6px;
  color: var(--muted);
  font-size: 1rem;
}

.quiz-sentence {
  font-size: clamp(1.18rem, 5vw, 1.48rem);
  font-weight: 760;
  line-height: 1.7;
}

.quiz-blank {
  display: inline-block;
  min-width: 80px;
  padding: 3px 12px;
  color: var(--primary-dark);
  border-bottom: 3px solid var(--primary);
  font-weight: 850;
}

.quiz-hint {
  margin-top: 10px;
  color: var(--muted);
  font-size: 0.95rem;
  font-style: italic;
}

.quiz-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.quiz-option {
  min-height: 58px;
  padding: 15px 17px;
  text-align: left;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 1.04rem;
  font-weight: 720;
  cursor: pointer;
  transition: background 0.16s, border-color 0.16s, box-shadow 0.16s, transform 0.16s;
}

.quiz-option:hover:not(:disabled) {
  background: #f8fbff;
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

.quiz-option.correct {
  color: #065f46;
  background: var(--success-soft);
  border-color: #6ee7b7;
}

.quiz-option.wrong {
  color: #991b1b;
  background: var(--danger-soft);
  border-color: #fca5a5;
}

.quiz-timer-bar {
  height: 6px;
  margin-bottom: 14px;
  overflow: hidden;
  background: #e5eaf2;
  border-radius: 999px;
}

.quiz-timer-fill {
  height: 100%;
  background: var(--accent);
  border-radius: inherit;
  transition: width 0.1s linear;
}

.match-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.match-card {
  display: flex;
  align-items: center;
  justify-content: center;
  aspect-ratio: 3 / 4;
  padding: 8px 6px;
  text-align: center;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.94rem;
  font-weight: 760;
  line-height: 1.25;
  transition: background 0.16s, border-color 0.16s, box-shadow 0.16s, transform 0.16s;
}

.match-card:hover:not(.matched):not(.selected) {
  border-color: var(--primary);
  box-shadow: var(--shadow-sm);
  transform: translateY(-1px);
}

.match-card.selected {
  color: #1e40af;
  background: var(--primary-soft);
  border-color: #93c5fd;
}

.match-card.matched {
  pointer-events: none;
  color: #065f46;
  background: var(--success-soft);
  border-color: #6ee7b7;
  opacity: 0.55;
}

.match-card.wrong {
  color: #991b1b;
  background: var(--danger-soft);
  border-color: #fca5a5;
  animation: shake 0.4s;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.so-target {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  min-height: 76px;
  margin-bottom: 14px;
  padding: 14px;
  background: var(--surface);
  border: 1.5px dashed #b8c2d1;
  border-radius: var(--radius-md);
}

.so-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.so-word {
  padding: 10px 15px;
  color: #1e40af;
  background: var(--primary-soft);
  border: 1px solid #bfdbfe;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 1rem;
  font-weight: 760;
  user-select: none;
  transition: background 0.16s, border-color 0.16s, transform 0.16s;
}

.so-word:hover {
  background: #eff6ff;
  border-color: #93c5fd;
  transform: translateY(-1px);
}

.so-word.used {
  pointer-events: none;
  opacity: 0.28;
}

.so-target .so-word {
  color: #92400e;
  background: var(--accent-soft);
  border-color: #f5d48b;
}

.ox-sentence {
  margin-bottom: 18px;
  padding: 34px 24px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  font-size: clamp(1.18rem, 5vw, 1.45rem);
  font-weight: 720;
  line-height: 1.6;
}

.ox-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.ox-btn {
  min-height: 118px;
  padding: 24px;
  color: #fff;
  border: none;
  border-radius: var(--radius-lg);
  cursor: pointer;
  font-size: clamp(2.6rem, 12vw, 3.4rem);
  font-weight: 900;
  transition: box-shadow 0.16s, transform 0.16s;
}

.ox-btn.o {
  background: var(--success);
}

.ox-btn.x {
  background: var(--danger);
}

.ox-btn:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.result-card {
  padding: 34px 24px;
  text-align: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
}

.result-card .icon {
  margin-bottom: 14px;
  font-size: 4.6rem;
}

.result-card .title {
  margin-bottom: 6px;
  font-size: 1.65rem;
  font-weight: 900;
}

.stars {
  margin: 14px 0;
  font-size: 2.35rem;
  letter-spacing: 0;
}

.stars .filled {
  color: var(--accent);
}

.stars .empty {
  color: #d9e0ea;
}

.result-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 18px 0;
}

.result-stat {
  padding: 12px 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}

.result-stat .val {
  color: var(--primary-dark);
  font-size: 1.38rem;
  font-weight: 900;
}

.result-stat .lbl {
  color: var(--muted);
  font-size: 0.82rem;
}

.badge-earned {
  margin: 14px 0;
  padding: 13px;
  color: #92400e;
  background: var(--accent-soft);
  border: 1px solid #f5d48b;
  border-radius: var(--radius-md);
  font-weight: 760;
  animation: pulse 0.6s;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  z-index: 100;
  max-width: min(92vw, 560px);
  padding: 12px 18px;
  color: #fff;
  background: #172033;
  border-radius: 999px;
  box-shadow: var(--shadow-md);
  font-size: 0.95rem;
  font-weight: 700;
  opacity: 0;
  pointer-events: none;
  transform: translateX(-50%);
  transition: opacity 0.3s, transform 0.3s;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-6px);
}

#toast.success {
  background: var(--success);
}

#toast.danger {
  background: var(--danger);
}

#toast.accent {
  color: #78350f;
  background: var(--accent-soft);
  border: 1px solid #f5d48b;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(15, 23, 42, 0.48);
  backdrop-filter: blur(6px);
}

.modal {
  width: 100%;
  max-width: 420px;
  padding: 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
}

.row-between {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.back-btn {
  min-height: 34px;
  padding: 4px 10px;
  color: var(--primary-dark);
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 0.96rem;
  font-weight: 760;
}

.back-btn:hover {
  background: var(--primary-soft);
  border-color: #bfdbfe;
}

.loading {
  padding: 30px;
  color: var(--muted);
  text-align: center;
}

.spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  margin-right: 8px;
  border: 3px solid #e2e8f0;
  border-top-color: var(--primary);
  border-radius: 50%;
  vertical-align: middle;
  animation: spin 0.7s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.hidden {
  display: none !important;
}

@media (max-width: 700px) {
  #app {
    padding: 12px;
  }

  .topbar {
    position: static;
    align-items: flex-start;
    flex-direction: column;
  }

  .stats-row {
    justify-content: flex-start;
  }

  .panel,
  .home-lang-panel {
    padding: 18px;
  }

  .vocab-edit-grid,
  .mode-grid,
  .create-options {
    grid-template-columns: 1fr;
  }

  .unit-item {
    align-items: flex-start;
    flex-direction: column;
  }

  .unit-actions {
    width: 100%;
    justify-content: flex-start;
  }

  .game-header {
    flex-wrap: wrap;
  }

  .game-progress {
    order: 3;
    flex-basis: 100%;
  }

  .fc-controls {
    flex-direction: column;
  }
}

@media (max-width: 500px) {
  body {
    font-size: 15px;
  }

  .quiz-options,
  .ox-buttons,
  .result-stats {
    grid-template-columns: 1fr;
  }

  .match-grid {
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .match-card {
    font-size: 0.86rem;
  }
}

/* =====================================================
   SVG 선잇기 (Line Match)
   ===================================================== */
.lm-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-weight: 600;
  transition: border-color 0.16s, background 0.16s, transform 0.1s;
  user-select: none;
}
.lm-item:hover:not(.lm-matched) {
  border-color: var(--primary);
  transform: translateY(-1px);
}
.lm-item.lm-selected-left,
.lm-item.lm-selected-right {
  border-color: var(--primary);
  background: var(--primary-soft);
}
.lm-item.lm-matched {
  border-color: var(--success);
  background: var(--success-soft);
  color: #065f46;
  cursor: default;
}
.lm-item.lm-wrong {
  border-color: var(--danger);
  background: var(--danger-soft);
  animation: shake 0.4s ease;
}
.lm-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--primary);
  flex-shrink: 0;
}
.lm-dot-right { margin-left: auto; }
.lm-dot-left  { margin-right: 0; }

/* =====================================================
   받아쓰기 (Dictation)
   ===================================================== */
#dictation-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(-6px); }
  75%       { transform: translateX(6px); }
}

async function _withRetry(fn, attempts = 3) {
  let lastErr;
  for (let i = 0; i < attempts; i++) {
    try { return await fn(); }
    catch (e) { lastErr = e; if (i < attempts - 1) await new Promise(r => setTimeout(r, 500 * Math.pow(2, i))); }
  }
  throw lastErr;
}

async function _doSaveTeacher() {
  if (_savingTeacher) return;
  _savingTeacher = true;
  try {
    const payload = JSON.stringify({ units: state.units, settings: { language: state.language, students: state.students } });
    await _withRetry(() => window.storage.set(TEACHER_KEY, payload), 3);
    if (!_storageOK) { _storageOK = true; toast('저장 복구됨', 'success'); }
  } catch (e) {
    if (_storageOK) { _storageOK = false; toast('⚠️ 자동저장 일시 중단', 'accent'); }
    console.warn('Teacher save failed:', e.message || e);
  } finally { _savingTeacher = false; }
}

async function _doSaveStudent() {
  if (!state.currentStudent || _savingStudent) return;
  _savingStudent = true;
  try {
    const payload = JSON.stringify({ stats: state.stats });
    await _withRetry(() => window.storage.set(studentKey(state.currentStudent), payload), 3);
  } catch (e) {
    console.warn('Student save failed:', e.message || e);
  } finally { _savingStudent = false; }
}

/* =========================================================
   AI CONFIG & CALL ACTIONS
   ========================================================= */
function getProvider() { return localStorage.getItem('ai_provider') || 'anthropic'; }
function setProvider(p) { localStorage.setItem('ai_provider', p); }
function getApiKey(p) { return localStorage.getItem('ai_key_' + (p || getProvider())) || ''; }
function setApiKey(p, k) { if (k) localStorage.setItem('ai_key_' + p, k); else localStorage.removeItem('ai_key_' + p); }
function getModel(p) { const pr = p || getProvider(); const saved = localStorage.getItem('ai_model_' + pr); return (saved && PROVIDERS[pr].models.includes(saved)) ? saved : PROVIDERS[pr].models[0]; }
function setModel(p, m) { localStorage.setItem('ai_model_' + p, m); }

async function callAI(prompt) {
  const provider = getProvider();
  const key = getApiKey(provider);
  const model = getModel(provider);
  if (!key) throw new Error('API 키가 설정되지 않았습니다. 상단 버튼에서 설정하세요.');
  let text;
  if (provider === 'anthropic') {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model, max_tokens: 1200, messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) throw new Error('AI 호출 실패: ' + res.status + (res.status === 401 ? ' (API 키 확인)' : ''));
    const data = await res.json();
    text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  } else if (provider === 'openai' || provider === 'groq') {
    const url = provider === 'openai' ? 'https://api.openai.com/v1/chat/completions' : 'https://api.groq.com/openai/v1/chat/completions';
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model, max_tokens: 1200, messages: [{ role: 'user', content: prompt }] })
    });
    if (!res.ok) throw new Error('AI 호출 실패: ' + res.status + (res.status === 401 ? ' (API 키 확인)' : ''));
    const data = await res.json();
    text = data.choices[0].message.content;
  } else if (provider === 'gemini') {
    const geminiVersion = model.startsWith('gemini-1.5') ? 'v1' : 'v1beta';
    const res = await fetch(`https://generativelanguage.googleapis.com/${geminiVersion}/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    if (!res.ok) {
      let errMsg = '';
      try { const e = await res.json(); errMsg = e?.error?.message || ''; } catch {}
      throw new Error(`Gemini 오류 ${res.status}: ${errMsg || res.statusText}`);
    }
    const data = await res.json();
    text = data.candidates[0].content.parts[0].text;
  }
  if (!text || !text.trim()) throw new Error('AI 응답이 비어 있습니다.');
  return text;
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

// Gemini File API: PDF를 직접 업로드해 CIDFont 한국어 PDF도 처리
async function uploadToGeminiFiles(file, key) {
  const boundary = 'boundary_' + Math.random().toString(36).slice(2);
  const metadata = JSON.stringify({ file: { display_name: file.name, mimeType: 'application/pdf' } });
  const metaPart = `--${boundary}\r\nContent-Type: application/json; charset=utf-8\r\n\r\n${metadata}\r\n--${boundary}\r\nContent-Type: application/pdf\r\n\r\n`;
  const endPart = `\r\n--${boundary}--`;
  const metaBytes = new TextEncoder().encode(metaPart);
  const endBytes = new TextEncoder().encode(endPart);
  const fileBytes = new Uint8Array(await file.arrayBuffer());
  const body = new Uint8Array(metaBytes.length + fileBytes.length + endBytes.length);
  body.set(metaBytes, 0);
  body.set(fileBytes, metaBytes.length);
  body.set(endBytes, metaBytes.length + fileBytes.length);
  const res = await fetch(`https://generativelanguage.googleapis.com/upload/v1beta/files?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': `multipart/related; boundary=${boundary}`, 'X-Goog-Upload-Protocol': 'multipart' },
    body
  });
  if (!res.ok) {
    let msg = '';
    try { msg = (await res.json())?.error?.message || ''; } catch {}
    throw new Error(`PDF 업로드 실패 ${res.status}: ${msg}`);
  }
  return (await res.json()).file; // { name, uri, mimeType, ... }
}

async function callGeminiWithFile(fileUri, prompt, key, model) {
  const ver = model.startsWith('gemini-1.5') ? 'v1' : 'v1beta';
  const res = await fetch(`https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${key}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [
      { file_data: { mime_type: 'application/pdf', file_uri: fileUri } },
      { text: prompt }
    ] }] })
  });
  if (!res.ok) {
    let msg = '';
    try { msg = (await res.json())?.error?.message || ''; } catch {}
    throw new Error(`Gemini 오류 ${res.status}: ${msg}`);
  }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

function deleteGeminiFile(fileName, key) {
  fetch(`https://generativelanguage.googleapis.com/v1beta/${fileName}?key=${key}`, { method: 'DELETE' }).catch(() => {});
}

/* =========================================================

function $(s) { return document.querySelector(s); }
function el(tag, props = {}, children = []) {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k, v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'onClick') e.onclick = v;
    else if (k === 'html') e.innerHTML = v;
    else e.setAttribute(k, v);
  });
  (Array.isArray(children) ? children : [children]).forEach(c => {
    if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return e;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function toast(msg, type = '') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2200);
}
function getLangInfo() { return LANGS.find(l => l.code === state.language) || LANGS[0]; }
function getTranslation(obj, fallback = '') {
  if (!obj) return fallback;
  return obj[state.language] || obj.en || obj.ko || fallback;

function parseJSONSafe(text) {
  if (!text || typeof text !== 'string') return null;
  const cleaned = text.replace(/```json|```/g, '').trim();
  try { return JSON.parse(cleaned); } catch (e) {
    const match = cleaned.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
    if (!match) return null;
    try { return JSON.parse(match[0]); } catch (_) { return null; }
  }
}

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function validateExtractedText(pdfText) {
  if (!pdfText || !pdfText.trim()) {
    return 'PDF에서 텍스트를 추출하지 못했습니다. 이미지 기반(스캔) PDF는 지원되지 않습니다. 직접 입력을 이용하세요.';
  }
  const contentOnly = pdfText.replace(/---\s*Page\s*\d+\s*---/g, '').trim();
  if (contentOnly.length < 20) {
    return 'PDF에서 텍스트를 읽을 수 없습니다. 이 PDF는 한국어 전용 폰트(CIDFont) 인코딩을 사용해 브라우저에서 텍스트 추출이 불가능합니다.\n\n해결 방법: 직접 입력 탭에서 단원 내용을 붙여넣기 하거나 수동으로 입력하세요.';
  }
  return null;
}

function validateParsedUnit(parsed) {
  if (!parsed || typeof parsed !== 'object') return 'AI 응답이 유효한 JSON이 아닙니다.';
  if (!Array.isArray(parsed.vocab) && !Array.isArray(parsed.grammar) && !Array.isArray(parsed.quiz)) {
    return 'AI 결과에 vocab, grammar, quiz 항목이 모두 없습니다.';
  }
  return null;
}

function showPrompt(title, placeholder = '') {
  return new Promise(resolve => {
    const root = $('#modal-root');
    root.innerHTML = '';
    const backdrop = el('div', { class: 'modal-backdrop' });
    backdrop.onclick = (e) => { if (e.target === backdrop) { root.innerHTML = ''; resolve(null); } };
    const modal = el('div', { class: 'modal' });
    modal.appendChild(el('h3', { style: 'margin-bottom:14px' }, title));
    const input = el('input', { type: 'text', placeholder, style: 'width:100%; margin-bottom:14px' });
    modal.appendChild(input);
    const btns = el('div', { style: 'display:flex; gap:10px; justify-content:flex-end' });
    btns.appendChild(el('button', { class: 'btn btn-ghost', onClick: () => { root.innerHTML = ''; resolve(null); }}, '취소'));
    const okBtn = el('button', { class: 'btn btn-primary', onClick: () => { const v = input.value.trim(); root.innerHTML = ''; resolve(v || null); }}, '확인');
    btns.appendChild(okBtn);
    modal.appendChild(btns);
    backdrop.appendChild(modal);
    root.appendChild(backdrop);
    setTimeout(() => input.focus(), 50);
    input.onkeydown = (e) => { if (e.key === 'Enter') okBtn.click(); };
  });
}

// PDF.js for text extraction (avoids 413 errors with large image-heavy PDFs)
async function loadPdfJs() {
  if (window.pdfjsLib) return;
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('PDF.js 로딩 실패'));
    document.head.appendChild(s);
  });
}

async function extractPdfText(file) {
  await loadPdfJs();
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    fullText += `--- Page ${i} ---\n` + content.items.map(item => item.str).join(' ') + '\n\n';
  }
  return fullText;
}

// TTS (Text-to-Speech) 한국어 발음 재생 유틸리티
function speak(text) {
  if (!window.speechSynthesis) return;
  // 중복 재생 방지를 위해 기존 음성 취소
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR';
  u.rate = 0.85; // 학습자를 위해 약간 느린 발음 속도 제공
  window.speechSynthesis.speak(u);
}

    state.view = 'login';
    v = 'login';
  }


  const map = {
    'loading': renderLoadingPage,
    'login': renderLoginPage, 'signup': renderSignupPage, 'forgot-password': renderForgotPassword,
    'home': renderHome, 'teacher': renderTeacher, 'teacher-create': renderTeacherCreate,
    'teacher-edit': renderTeacherEdit, 'teacher-progress': renderTeacherProgress,
    'admin': renderAdmin, 'admin-teacher': renderAdminTeacherDetail,
    'student-select': renderStudentSelect,
    'student': renderStudent, 'student-unit': renderStudentUnit,
    'student-activity': renderStudentActivity, 'student-result': renderStudentResult
  };
  if (map[v]) app.appendChild(map[v]());

  // Lucide SVG 아이콘 자동 렌더링 스레드 실행
  if (window.lucide) {

  }

function renderTopbar() {
  const bar = el('div', { class: 'topbar' });
  bar.appendChild(el('div', { class: 'logo' }, '한국어 학습'));
  const statsRow = el('div', { class: 'stats-row' });
  const authViews = ['login', 'signup', 'forgot-password'];

  if (!authViews.includes(state.view) && state.view !== 'home') {
    statsRow.appendChild(el('button', { class: 'btn btn-ghost btn-sm', onClick: goHome }, [
      el('i', { 'data-lucide': 'home', style: 'width:16px; height:16px; display:block;' })
    ]));
  }

  if (state.currentUser) {
    // 언어 선택 (학생 모드)
    if (state.currentStudent) {
      const lang = getLangInfo();
      statsRow.appendChild(el('div', { class: 'stat-chip lang', onClick: showLangModal }, `${lang.flag} ${lang.code.toUpperCase()}`));
    }
    // 관리자 버튼 (admin만)
    if (state.currentUser.isAdmin) {
      statsRow.appendChild(el('button', { class: 'btn btn-ghost btn-sm', onClick: () => { state.view = 'admin'; render(); } }, [
        el('i', { 'data-lucide': 'shield', style: 'margin-right:4px; width:15px; height:15px; vertical-align:middle;' }),
        '관리자'
      ]));
    }
    // 로그인 유저 이름
    const icon = state.currentUser.isAdmin ? 'crown' : state.currentTeacher ? 'book-open' : 'graduation-cap';
    statsRow.appendChild(el('div', { class: 'stat-chip', style: 'background:#e0e7ff; color:#3730a3; border-color:#c7d2fe' }, [
      el('i', { 'data-lucide': icon, style: 'margin-right:4px; width:14px; height:14px; vertical-align:middle;' }),
      state.currentUser.name
    ]));
    // 학생 XP/레벨
    if (state.currentStudent) {
      statsRow.appendChild(el('div', { class: 'stat-chip level' }, `⭐ Lv.${state.stats.level}`));
      statsRow.appendChild(el('div', { class: 'stat-chip xp' }, `✨${state.stats.xp}`));
      if (state.stats.streak > 0) statsRow.appendChild(el('div', { class: 'stat-chip streak' }, `🔥 ${state.stats.streak}`));
    }
    // 로그아웃
    statsRow.appendChild(el('button', { class: 'btn btn-ghost btn-sm', onClick: fbSignOut, title: '로그아웃' }, [
      el('i', { 'data-lucide': 'log-out', style: 'width:15px; height:15px;' })
    ]));
  }

  bar.appendChild(statsRow);
  return bar;
}

function goHome() {
  if (state.currentStudent) {
    state.stats.streak = 0;
    persistStudent(true);
    state.currentStudent = null;
    state.stats = defaultStats();
  }
  state.currentTeacher = null;
  state.view = 'home';
  state.currentUnitId = null;
  state.currentActivity = null;
  state.game = null;
  render();
}

function showApiKeyModal() {
  const root = $('#modal-root');
  let selectedProvider = getProvider();

  function renderModal() {
    root.innerHTML = '';
    const backdrop = el('div', { class: 'modal-backdrop', onClick: (e) => { if (e.target === backdrop) root.innerHTML = ''; }});
    const modal = el('div', { class: 'modal', style: 'max-width:480px' });
    modal.appendChild(el('h3', { style: 'margin-bottom:12px' }, '🤖 AI 프로바이더 설정'));

    // 프로바이더 탭
    const tabs = el('div', { style: 'display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:16px' });
    Object.entries(PROVIDERS).forEach(([code, info]) => {
      const isActive = selectedProvider === code;
      const hasK = !!getApiKey(code);
      const tab = el('button', {
        class: 'btn btn-sm',
        style: `padding:10px 4px; line-height:1.3; white-space:pre-line; background:${isActive ? 'var(--primary)' : '#f1f5f9'}; color:${isActive ? '#fff' : '#374151'}; ${hasK ? 'outline:2px solid #10b981; outline-offset:1px' : ''}`,
        onClick: () => { selectedProvider = code; renderModal(); }
      });
      tab.appendChild(el('i', { 'data-lucide': info.icon, style: 'display:block; margin:0 auto 4px; width:18px; height:18px;' }));
      tab.appendChild(document.createTextNode(`${info.name}${hasK ? ' ✓' : ''}`));
      tabs.appendChild(tab);
    });
    modal.appendChild(tabs);

    const info = PROVIDERS[selectedProvider];
    const currentKey = getApiKey(selectedProvider);
    const currentModel = getModel(selectedProvider);

    // 안내 문구
    const desc = el('p', { style: 'color:#64748b; font-size:0.88rem; margin-bottom:8px; line-height:1.5' });
    desc.textContent = 'API 키는 이 기기의 localStorage에만 저장되며 외부로 전송되지 않습니다.';
    const warn = el('p', { style: 'color:#92400e; background:#fef3c7; border-radius:6px; padding:8px 10px; font-size:0.82rem; margin-bottom:12px; line-height:1.5' });
    warn.textContent = '⚠️ 공용 PC·공유 브라우저에서는 키가 노출될 수 있습니다. 수업 후 반드시 삭제하세요.';
    modal.appendChild(desc);
    modal.appendChild(warn);

    // API 키 입력
    const labelEl = el('label', { style: 'font-size:0.9rem; font-weight:600; margin-bottom:5px; display:block' });
    labelEl.appendChild(el('i', { 'data-lucide': info.icon, style: 'margin-right:4px; vertical-align:middle; width:15px; height:15px; display:inline-block;' }));
    labelEl.appendChild(document.createTextNode(` ${info.name} API 키`));
    modal.appendChild(labelEl);
    const input = el('input', { type: 'password', placeholder: info.keyHint, style: 'width:100%; margin-bottom:12px; font-family:monospace' });
    input.value = currentKey;
    modal.appendChild(input);

    // 모델 선택
    modal.appendChild(el('label', { style: 'font-size:0.9rem; font-weight:600; margin-bottom:5px; display:block' }, '모델'));
    const modelSel = el('select', { style: 'width:100%; margin-bottom:16px' });
    info.models.forEach(m => {
      const opt = el('option', { value: m }, m);
      if (m === currentModel) opt.setAttribute('selected', '');
      modelSel.appendChild(opt);
    });
    modal.appendChild(modelSel);

    // 버튼
    const btns = el('div', { style: 'display:flex; gap:8px' });
    btns.appendChild(el('button', { class: 'btn btn-ghost', style: 'flex:1', onClick: () => root.innerHTML = '' }, '닫기'));
    if (currentKey) {
      btns.appendChild(el('button', { class: 'btn btn-danger btn-sm', onClick: () => {
        setApiKey(selectedProvider, '');
        renderModal();
        toast('키 삭제됨', 'danger');
      }}, '삭제'));
    }
    btns.appendChild(el('button', { class: 'btn btn-primary', style: 'flex:1', onClick: () => {
      const k = input.value.trim();
      if (!k) { toast('API 키를 입력하세요', 'danger'); return; }
      setApiKey(selectedProvider, k);
      setModel(selectedProvider, modelSel.value);
      setProvider(selectedProvider);
      root.innerHTML = '';
      render();
      toast('✅ 설정 저장됨', 'success');
    }}, '저장'));
    modal.appendChild(btns);

    backdrop.appendChild(modal);
    root.appendChild(backdrop);
    setTimeout(() => input.focus(), 50);
  }

  renderModal();
}

function showLangModal() {
  const root = $('#modal-root');

/* ---------- 회원가입 ---------- */
function renderSignupPage() {
  const root = el('div', { style: 'max-width:480px; margin:40px auto' });
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('button', { class: 'back-btn', onClick: () => { state.view = 'login'; render(); } }, '← 로그인'));

  const ttl = el('h2', { style: 'margin-top:10px; display:flex; align-items:center; gap:8px' });
  ttl.appendChild(el('i', { 'data-lucide': 'user-plus', style: 'width:22px; height:22px; color:var(--primary)' }));
  ttl.appendChild(document.createTextNode('회원가입'));
  panel.appendChild(ttl);

  const f = (label, input) => {
    const w = el('div', { style: 'margin-bottom:12px' });
    w.appendChild(el('label', { style: 'display:block; font-size:0.88rem; font-weight:600; margin-bottom:4px' }, label));
    w.appendChild(input);
    return w;
  };

  const nameIn  = el('input', { type: 'text',     placeholder: '홍길동',             style: 'width:100%' });
  const phoneIn = el('input', { type: 'tel',      placeholder: '010-0000-0000',     style: 'width:100%' });
  const emailIn = el('input', { type: 'email',    placeholder: 'example@email.com', style: 'width:100%' });
  const addrIn  = el('input', { type: 'text',     placeholder: '서울시 강남구 ...',  style: 'width:100%' });
  const pwIn    = el('input', { type: 'password', placeholder: '6자 이상',          style: 'width:100%' });
  const pwCfmIn = el('input', { type: 'password', placeholder: '비밀번호 재입력',   style: 'width:100%' });

  [f('이름 *', nameIn), f('연락처 *', phoneIn), f('이메일 *', emailIn),
   f('주소', addrIn), f('비밀번호 * (6자 이상)', pwIn), f('비밀번호 확인 *', pwCfmIn)]
    .forEach(w => panel.appendChild(w));

  const submitBtn = el('button', { class: 'btn btn-primary btn-block btn-lg', style: 'margin-top:4px', onClick: async () => {
    const name  = nameIn.value.trim();
    const phone = phoneIn.value.trim();
    const email = emailIn.value.trim();
    const pw    = pwIn.value;
    if (!name || !phone || !email || !pw) { toast('필수 항목을 모두 입력하세요', 'danger'); return; }
    if (pw.length < 6) { toast('비밀번호는 6자 이상이어야 합니다', 'danger'); return; }
    if (pw !== pwCfmIn.value) { toast('비밀번호가 일치하지 않습니다', 'danger'); return; }

    submitBtn.disabled = true; submitBtn.textContent = '처리 중...';
    try {
      // 회원가입 중 onAuthStateChanged 중복 실행 방지
      window._signingUp = true;

      const cred = await fbRegister(email, pw);
      const uid  = cred.user.uid;

      // 첫 번째 가입자 = 관리자
      const existing = await fbGetAllTeachers();
      const isAdmin  = existing.length === 0;

      // Firestore 문서 먼저 저장 후 라우팅 (Race condition 방지)
      await fbSaveTeacher(uid, {
        name, phone, email, address: addrIn.value.trim(),
        status: 'teaching', note: '', isAdmin,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      window._signingUp = false;

      // 직접 onAuthLogin 호출
      state.view = 'loading';
      render();
      await onAuthLogin(cred.user);
      render();
      toast(`✅ 가입 완료${isAdmin ? ' (관리자 계정)' : ''}! 환영합니다.`, 'success');
    } catch (e) {
      window._signingUp = false;
      const msg = e.code === 'auth/email-already-in-use' ? '이미 사용 중인 이메일입니다' : '가입 실패: ' + e.message;
      toast(msg, 'danger');
      submitBtn.disabled = false; submitBtn.textContent = '가입하기';
    }
  }}, '가입하기');
  panel.appendChild(submitBtn);
  root.appendChild(panel);
  return root;
}

    const resetBtn = el('button', { class: 'btn btn-danger', style: 'display:inline-flex; align-items:center; gap:6px', onClick: async () => {

      state.language = 'en';
      state.students = [];
      state.currentStudent = null;
      state.view = 'home';
      state.currentUnitId = null;
      state.currentActivity = null;
      state.game = null;
      await persistTeacher(true);
      toast('초기화 완료. 처음부터 시작합니다.', 'success');
      render();

    resetBtn.appendChild(el('i', { 'data-lucide': 'refresh-cw', style: 'width:15px; height:15px; color:#fff;' }));
    resetBtn.appendChild(document.createTextNode('모든 데이터 초기화하기'));
    dangerPanel.appendChild(resetBtn);
    root.appendChild(dangerPanel);
  }

  return root;
}

  state.units.push({ id: Date.now(), title, vocabulary: [], grammar: [], quizzes: [] });

  render();

async function handlePDFUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const provider = getProvider();
  if (!getApiKey(provider)) {
    toast('⚠️ AI 설정을 먼저 완료하세요 (상단 버튼)', 'danger');
    showApiKeyModal();
    return;
  }
  const status = $('#pdf-status');
  status.className = 'loading';
  const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
  const pInfo = PROVIDERS[provider];

  try {
    let aiText;

    if (provider === 'gemini') {
      status.innerHTML = `<span class="spinner"></span> PDF (${sizeMB}MB) Gemini에 업로드 중...`;
      const key = getApiKey('gemini');
      const model = getModel('gemini');
      const uploadedFile = await uploadToGeminiFiles(file, key);
      status.innerHTML = `<span class="spinner"></span> ${pInfo.icon} ${pInfo.name} PDF 분석 중...`;
      const langName = LANGS.find(l => l.code === state.language)?.name || 'English';
      const prompt = `이것은 한국어 학습 교재 PDF입니다. 학생 언어: ${langName}. 내용을 분석하여 아래 JSON 형식으로만 출력하세요 (마크다운, 코드블록 없이 순수 JSON만):\n{"title":"단원 제목","vocab":[{"w":"한글단어","r":"romanization","e":"📝","m":"${langName}로 뜻"}],"grammar":[{"p":"~패턴","x":"${langName}로 설명","ex":[{"k":"한국어 예문","e":"${langName}로 번역"}]}],"quiz":[{"q":"문장 ___ 빈칸","o":["선택지1","선택지2","선택지3","선택지4"],"c":0,"h":"${langName}로 힌트"}]}\n\n요구사항:\n- 모든 한국어 어휘 추출 (장소, 동사, 명사, 형용사 등)\n- 1~3개 문법 패턴 식별\n- 5~6개 빈칸 채우기 퀴즈 (4지선다)\n- 뜻/설명/힌트는 반드시 ${langName}로 작성\n- JSON만 출력`;
      try {
        aiText = await callGeminiWithFile(uploadedFile.uri, prompt, key, model);
      } finally {
        deleteGeminiFile(uploadedFile.name, key);
      }
    } else {
      status.innerHTML = `<span class="spinner"></span> PDF (${sizeMB}MB) 텍스트 추출 중...`;
      const pdfText = await extractPdfText(file);
      const validationError = validateExtractedText(pdfText);
      if (validationError) throw new Error(validationError);
      const textForAI = pdfText.slice(0, 6000);
      status.innerHTML = `<span class="spinner"></span> ${pInfo.icon} ${pInfo.name} 분석 중... (${textForAI.length}자)`;
      const langName = LANGS.find(l => l.code === state.language)?.name || 'English';
      const prompt = `Below is text from a Korean language learning textbook. Student language: ${langName}. Extract content as JSON only (no markdown):\n{"title":"단원 제목","vocab":[{"w":"한글단어","r":"romanization","e":"📝","m":"meaning in ${langName}"}],"grammar":[{"p":"~패턴","x":"explanation in ${langName}","ex":[{"k":"예문","e":"translation in ${langName}"}]}],"quiz":[{"q":"문장 ___ 빈칸","o":["a","b","c","d"],"c":0,"h":"hint in ${langName}"}]}\n\nAll meanings, explanations, and hints MUST be written in ${langName}.\n\nTEXT:\n${textForAI}`;
      aiText = await callAI(prompt);
    }

    const parsed = parseJSONSafe(aiText);
    const parseError = validateParsedUnit(parsed);
    if (parseError) throw new Error(parseError);

    const newUnit = {
      id: Date.now(),
      title: parsed.title || '새 단원',
      vocabulary: (parsed.vocab || []).map(v => ({
        word: v.w || v.word || v.korean || '',
        romanization: v.r || v.romanization || '',
        emoji: v.e || v.emoji || '📝',
        translations: { en: v.m || v.meaning || v.english || '', [state.language]: v.m || v.meaning || v.english || '' }
      })).filter(v => v.word),
      grammar: (parsed.grammar || []).map(g => ({
        pattern: g.p || g.pattern || '',
        explanation: { en: g.x || g.explanation || g.english || '', [state.language]: g.x || g.explanation || g.english || '' },
        examples: (g.ex || g.examples || []).map(ex => ({
          ko: ex.k || ex.korean || '',
          en: ex.e || ex.english || ''
        }))
      })).filter(g => g.pattern),
      quizzes: (parsed.quiz || []).map(q => ({
        question: q.q || q.question || '',
        options: q.o || q.options || [],
        correct: typeof q.c === 'number' ? q.c : (typeof q.correct === 'number' ? q.correct : 0),
        hint: { en: q.h || q.hint || '', [state.language]: q.h || q.hint || '' }
      })).filter(q => q.question && q.options && q.options.length >= 2)
    };

    const totalCount = newUnit.vocabulary.length + newUnit.grammar.length + newUnit.quizzes.length;
    if (totalCount === 0) throw new Error('추출된 콘텐츠가 없습니다. PDF 내용을 AI가 인식하지 못했습니다. 직접 입력을 이용하세요.');

    state.units.push(newUnit);
    await persistAll(true);
    status.className = 'loading hidden';
    toast(`✅ 어휘 ${newUnit.vocabulary.length} · 문법 ${newUnit.grammar.length} · 퀴즈 ${newUnit.quizzes.length}`, 'success');
    state.currentUnitId = newUnit.id;
    state.view = 'teacher-edit';
    render();
  } catch (err) {
    console.error('PDF error:', err);
    status.className = 'loading';
    const message = err.message || '알 수 없는 오류가 발생했습니다.';
    status.innerHTML = `❌ 오류: ${message.split('\n')[0]}<br><small style="white-space:pre-line">${message.split('\n').slice(1).join('\n')}</small>`;
  }
}

function renderTeacherEdit() {

  titleInput.oninput = () => { unit.title = titleInput.value; };
  headPanel.appendChild(el('label', { style: 'margin-top:10px' }, '단원 제목'));
  headPanel.appendChild(titleInput);
  root.appendChild(headPanel);

  // Vocabulary
  const vocabPanel = el('div', { class: 'panel' });
  const vocabTitle = el('h2', { style: 'display:flex; align-items:center; gap:8px' });
  vocabTitle.appendChild(el('i', { 'data-lucide': 'book', style: 'width:22px; height:22px; color:var(--primary);' }));
  vocabTitle.appendChild(document.createTextNode(`어휘 (${unit.vocabulary.length})`));
  vocabPanel.appendChild(vocabTitle);

  const missingTrans = unit.vocabulary.filter(v => !v.translations || !v.translations.zh || !v.translations.ja).length;
  if (unit.vocabulary.length > 0 && missingTrans > 0) {
    const bulkTransBtn = el('button', { class: 'btn btn-accent btn-block', style: 'margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:6px', onClick: () => bulkTranslateVocab(unit) });
    bulkTransBtn.appendChild(el('i', { 'data-lucide': 'globe', style: 'width:16px; height:16px;' }));
    bulkTransBtn.appendChild(document.createTextNode(`모든 단어 자동 번역 (${missingTrans}개 · 6개 언어)`));
    vocabPanel.appendChild(bulkTransBtn);
  }

  unit.vocabulary.forEach((v, i) => {
    const item = el('div', { class: 'vocab-edit-item' });
    const itemHead = el('div', { style: 'display:flex; justify-content:flex-end; margin-bottom:4px' });
    itemHead.appendChild(makeMoveButtons(unit.vocabulary, i, () => { persistAll(); render(); }));
    item.appendChild(itemHead);
    const grid = el('div', { class: 'vocab-edit-grid' });
    const emojiIn = el('input', { type: 'text', value: v.emoji || '', placeholder: '😀' });
    emojiIn.oninput = () => { v.emoji = emojiIn.value; };
    const wordIn = el('input', { type: 'text', value: v.word, placeholder: '한국어' });
    wordIn.oninput = () => { wordIn.value = wordIn.value; v.word = wordIn.value; };
    wordIn.onblur = () => { autoFillEmoji(v, emojiIn); };
    const romanIn = el('input', { type: 'text', value: v.romanization || '', placeholder: '발음' });
    romanIn.oninput = () => { v.romanization = romanIn.value; };
    const meaningIn = el('input', { type: 'text', value: (v.translations && v.translations.en) || '', placeholder: 'English' });
    meaningIn.oninput = () => { if (!v.translations) v.translations = {}; v.translations.en = meaningIn.value; };
    
    const delBtn = el('button', { class: 'btn btn-danger btn-sm', style: 'display:inline-flex; align-items:center; justify-content:center;', onClick: () => { unit.vocabulary.splice(i, 1); persistAll(); render(); }});
    delBtn.appendChild(el('i', { 'data-lucide': 'trash-2', style: 'width:13px; height:13px; color:#fff;' }));
    
    grid.append(emojiIn, wordIn, romanIn, meaningIn, delBtn);
    item.appendChild(grid);

function addVocab(unit) {
  unit.vocabulary.push({ word: '', romanization: '', emoji: '📝', translations: {} });
  render();
  scrollToNewItem('.vocab-edit-item', 'input[placeholder="한국어"]');
}

function addGrammar(unit) {
  unit.grammar.push({ pattern: '', explanation: {}, examples: [] });
  render();
  scrollToNewItem('.grammar-edit-item', 'input[type="text"]');
}

function addQuiz(unit, type = 'choice') {
  if (!unit.quizzes) unit.quizzes = [];
  if (type === 'linematch') {
    unit.quizzes.push({ type: 'linematch', pairs: [{ left: '', right: '' }, { left: '', right: '' }] });
  } else {
    unit.quizzes.push({ type: 'choice', question: '', options: ['', '', '', ''], correct: 0, hint: {} });
  }
  render();
  scrollToNewItem('.quiz-edit-item', 'input[type="text"]');
}

function makeMoveButtons(arr, idx, persistAndRender) {
  const wrap = el('div', { style: 'display:inline-flex; gap:2px' });
  const btnStyle = 'padding:0 8px; min-height:28px; font-size:0.9rem; line-height:1;';
  const up = el('button', {
    class: 'btn btn-ghost btn-sm',
    style: btnStyle + (idx === 0 ? ' opacity:0.3; pointer-events:none' : ''),
    onClick: () => { [arr[idx - 1], arr[idx]] = [arr[idx], arr[idx - 1]]; persistAndRender(); }
  }, '↑');
  const dn = el('button', {
    class: 'btn btn-ghost btn-sm',
    style: btnStyle + (idx === arr.length - 1 ? ' opacity:0.3; pointer-events:none' : ''),
    onClick: () => { [arr[idx], arr[idx + 1]] = [arr[idx + 1], arr[idx]]; persistAndRender(); }
  }, '↓');
  wrap.append(up, dn);
  return wrap;
}

function scrollToNewItem(itemSelector, focusSelector) {
  setTimeout(() => {
    const items = document.querySelectorAll(itemSelector);
    if (items.length === 0) return;
    const last = items[items.length - 1];
    last.scrollIntoView({ behavior: 'smooth', block: 'center' });
    // Highlight briefly
    last.style.transition = 'background 0.4s';
    const original = last.style.background;
    last.style.background = '#fef3c7';
    setTimeout(() => { last.style.background = original; }, 800);
    if (focusSelector) {
      const input = last.querySelector(focusSelector);
      if (input) setTimeout(() => input.focus(), 400);
    }
  }, 100);
}

async function autoFillEmoji(v, emojiInput) {
  if (!v.word || (v.emoji && v.emoji !== '📝') || !getApiKey(getProvider())) return;
  try {
    const text = await callAI(`Korean word: "${v.word}". Reply with ONLY one emoji. Nothing else.`);
    const match = text.trim().match(/\p{Extended_Pictographic}/u);
    const emoji = match ? match[0] : null;
    if (emoji) {
      v.emoji = emoji;
      if (emojiInput) emojiInput.value = emoji;
      persistAll();
    }
  } catch (e) {}
}

async function autoTranslateVocab(v) {
  if (!v.word) { toast('먼저 한국어 단어 입력', 'danger'); return; }
  toast('🌐 번역 중..', 'accent');
  try {
    const prompt = `For the Korean word "${v.word}", return ONLY JSON: {"romanization":"...","emoji":"X","translations":{"en":"...","zh":"...","ja":"...","th":"...","es":"...","vi":"..."}} - romanization with hyphens, ONE emoji.`;
    const text = await callAI(prompt);
    const parsed = parseJSONSafe(text);
    if (!parsed) throw new Error('AI 응답을 파싱할 수 없습니다.');
    v.romanization = parsed.romanization;
    v.emoji = parsed.emoji;
    v.translations = parsed.translations;
    await persistAll();
    toast('✅ 완료', 'success');
    render();
  } catch (e) { console.error(e); toast('번역 실패', 'danger'); }
}

async function bulkTranslateVocab(unit) {
  const targets = unit.vocabulary.filter(v => v.word && (!v.translations || !v.translations.zh));
  if (targets.length === 0) { toast('번역할 단어가 없습니다', 'accent'); return; }
  const total = targets.length;
  let done = 0;
  toast(`🌐 ${total}개 번역 시작...`, 'accent');
  const CHUNK = 5;
  for (let i = 0; i < targets.length; i += CHUNK) {
    const chunk = targets.slice(i, i + CHUNK);
    try {
      const list = chunk.map((v, idx) => `${idx + 1}. ${v.word}`).join('\n');
      const prompt = `For each Korean word below, return JSON array. Each item: {"r":"romanization","e":"emoji","t":{"en":"...","zh":"...","ja":"...","th":"...","es":"...","vi":"...","ne":"...","hi":"..."}}\n\nWords:\n${list}\n\nReturn ONLY a JSON array of ${chunk.length} items in same order.`;
      const text = await callAI(prompt);
      const arr = parseJSONSafe(text);
      if (!Array.isArray(arr)) { console.warn('bulkTranslate: 파싱 실패, 건너뜀'); continue; }
      chunk.forEach((v, idx) => {
        const it = arr[idx];
        if (!it) return;
        v.romanization = v.romanization || it.r;
        v.emoji = (v.emoji === '📝' || !v.emoji) ? it.e : v.emoji;
        v.translations = v.translations || {};
        ['en','zh','ja','th','es','vi','ne','hi'].forEach(lang => {
          if (!v.translations[lang] && it.t && it.t[lang]) v.translations[lang] = it.t[lang];
        });
      });
      done += chunk.length;
      toast(`🌐 어휘 ${done}/${total}`, 'accent');
      await persistAll();
      render();
    } catch (err) { console.error(err); }
  }
  toast(`✅ 어휘 번역 완료 (${done}/${total})`, 'success');
}

async function bulkTranslateGrammar(unit) {
  const targets = unit.grammar.filter(g => g.explanation && (g.explanation.ko || g.explanation.en) && (!g.explanation.zh || !g.explanation.ne));
  if (targets.length === 0) return 0;
  const total = targets.length;
  let done = 0;
  toast(`🌐 문법 ${total}개 번역 시작...`, 'accent');
  for (const g of targets) {
    try {
      const source = g.explanation.ko || g.explanation.en;
      const prompt = `아래 한국어 문법 설명을 7개 언어로 번역하세요. JSON만 출력하세요 (마크다운 없이):
{"en":"English","zh":"中文","ja":"日本語","th":"ภาษาไทย","es":"Español","vi":"Tiếng Việt","ne":"नेपाली","hi":"हिन्दी"}

패턴: ${g.pattern}
한국어 설명: ${source}

한국어 학습자를 위해 간결하고 명확하게 번역하세요.`;
      const text = await callAI(prompt);
      const parsed = parseJSONSafe(text);
      if (!parsed) { console.warn('bulkTranslateGrammar: 파싱 실패, 건너뜀'); continue; }
      ['en','zh','ja','th','es','vi','ne','hi'].forEach(lang => {
        if (!g.explanation[lang] && parsed[lang]) g.explanation[lang] = parsed[lang];
      });
      done++;
      toast(`🌐 문법 ${done}/${total}`, 'accent');
      await persistAll();
    } catch (e) { console.warn('Grammar translation failed:', e); }
  }
  return done;
}

async function saveWithAutoTranslate(unit) {
  // Count items needing translation
  const vocabNeed = unit.vocabulary.filter(v => v.word && (!v.translations || !v.translations.zh));
  const grammarNeed = unit.grammar.filter(g => g.explanation && (g.explanation.ko || g.explanation.en) && (!g.explanation.zh));

  if (vocabNeed.length === 0 && grammarNeed.length === 0) {
    await persistAll(true);
    toast('✅ 저장 완료', 'success');
    return;
  }

  toast(`🌐 저장 + 자동 번역 시작... (어휘 ${vocabNeed.length}, 문법 ${grammarNeed.length})`, 'accent');

  if (vocabNeed.length > 0) await bulkTranslateVocab(unit);
  if (grammarNeed.length > 0) await bulkTranslateGrammar(unit);

  await persistAll(true);
  toast('✅ 저장 + 자동 번역 완료!', 'success');
  render();
}

/* =========================================================
   TEACHER PROGRESS
   ========================================================= */
const BADGE_NAMES = { perfect: '완벽주의자', combo10: '🔥 10연속', xp500: '⭐ XP 500', level5: '🏆 Lv.5 달성' };
let _progressCache = null;

async function loadAllStudentProgress() {
  const cache = {};
  await Promise.all(state.students.map(async name => {
    try {
      const r = await window.storage.get(studentKey(name));
      cache[name] = (r && r.value) ? (JSON.parse(r.value).stats || defaultStats()) : defaultStats();
    } catch (e) { cache[name] = defaultStats(); }
  }));
  return cache;
}

function getUnitActivities(unit) {
  const acts = [];
  if (unit.vocabulary.length > 0) {
    acts.push('flashcard');
    if (unit.vocabulary.length >= 4) { acts.push('quiz'); acts.push('matching'); }
  }
  if (unit.grammar.length > 0) { acts.push('fillblank'); acts.push('sentorder'); acts.push('oxquiz'); }
  if ((unit.quizzes || []).length > 0) acts.push('pdfquiz');
  return acts;
}

function calcUnitProgress(bestScores, unit) {
  const acts = getUnitActivities(unit);
  if (acts.length === 0) return null;
  const done = acts.filter(act => (bestScores[`${unit.id}_${act}`] || 0) > 0).length;
  return { done, total: acts.length, pct: Math.round(done / acts.length * 100) };
}

function calcOverallProgress(bestScores) {
  let done = 0, total = 0;
  state.units.forEach(unit => {
    const p = calcUnitProgress(bestScores, unit);
    if (p) { done += p.done; total += p.total; }
  });
  return total > 0 ? Math.round(done / total * 100) : 0;
}

function renderProgressBar(pct, height = '10px') {
  const color = pct >= 80 ? '#10b981' : pct >= 50 ? '#3b82f6' : pct > 0 ? '#f59e0b' : '#e2e8f0';
  const wrap = el('div', { style: `background:#e2e8f0; border-radius:99px; height:${height}; overflow:hidden; flex:1` });
  wrap.appendChild(el('div', { style: `background:${color}; width:${pct}%; height:100%; border-radius:99px` }));
  return wrap;
}

function renderTeacherProgress() {
  const root = el('div');
  const panel = el('div', { class: 'panel' });
  panel.appendChild(el('button', { class: 'back-btn', onClick: () => { _progressCache = null; state.view = 'teacher'; render(); }}, '← 교사 메뉴'));
  
  const title = el('h2', { style: 'margin-top:10px; display:flex; align-items:center; gap:8px' });

  panel.appendChild(title);

  if (state.students.length === 0) {
    panel.appendChild(el('p', { class: 'text-muted', style: 'text-align:center; padding:20px' }, '교사 메뉴 → 학생 명단에서 이름을 추가해주세요.'));

  }

  if (!_progressCache) {

    loadAllStudentProgress().then(cache => { _progressCache = cache; render(); });

  }

  const avgPct = Math.round(
    state.students.reduce((sum, name) => sum + calcOverallProgress((_progressCache[name] || defaultStats()).bestScores), 0) / state.students.length
  );
  
  const summary = el('div', { style: 'display:flex; align-items:center; gap:16px; flex-wrap:wrap; background:#f1f5f9; border-radius:12px; padding:14px 18px; margin-bottom:20px' });

  const avgSpan = el('span', { style: 'display:inline-flex; align-items:center; gap:4px; font-weight:600; color:#059669' });
  avgSpan.appendChild(el('i', { 'data-lucide': 'trending-up', style: 'width:15px; height:15px; color:#059669;' }));
  avgSpan.appendChild(document.createTextNode(`평균 ${avgPct}%`));
  summary.appendChild(avgSpan);
  
  const unitSpan = el('span', { style: 'display:inline-flex; align-items:center; gap:4px; font-weight:600' });
  unitSpan.appendChild(el('i', { 'data-lucide': 'book', style: 'width:15px; height:15px; color:var(--primary);' }));
  unitSpan.appendChild(document.createTextNode(`단원 ${state.units.length}개`));
  summary.appendChild(unitSpan);
  
  const refreshBtn = el('button', { class: 'btn btn-ghost btn-sm', style: 'margin-left:auto; display:inline-flex; align-items:center; gap:4px', onClick: () => { _progressCache = null; render(); } });
  refreshBtn.appendChild(el('i', { 'data-lucide': 'refresh-cw', style: 'width:13px; height:13px;' }));
  refreshBtn.appendChild(document.createTextNode('새로고침'));
  summary.appendChild(refreshBtn);
  
  panel.appendChild(summary);

  state.students.forEach(name => {
    const stats = _progressCache[name] || defaultStats();
    const overallPct = calcOverallProgress(stats.bestScores);

    const card = el('div', { style: 'border:1px solid #e2e8f0; border-radius:14px; padding:18px; margin-bottom:14px' });

    const hdr = el('div', { style: 'display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap' });
    
    const sNameDiv = el('div', { style: 'font-size:1.1rem; font-weight:700; color:#1e293b; flex:1; display:flex; align-items:center; gap:6px' });
    sNameDiv.appendChild(el('i', { 'data-lucide': 'user', style: 'width:18px; height:18px; color:var(--primary);' }));
    sNameDiv.appendChild(document.createTextNode(name));
    hdr.appendChild(sNameDiv);
    
    hdr.appendChild(el('div', { style: 'background:#ede9fe; color:#5b21b6; border-radius:20px; padding:3px 10px; font-size:0.85rem; font-weight:600' }, `⭐ Lv.${stats.level}`));
    hdr.appendChild(el('div', { style: 'background:#fef3c7; color:#92400e; border-radius:20px; padding:3px 10px; font-size:0.85rem; font-weight:600' }, `✨ ${stats.xp} XP`));
    card.appendChild(hdr);

    const overallRow = el('div', { style: 'display:flex; align-items:center; gap:10px; margin-bottom:14px' });
    overallRow.appendChild(el('div', { style: 'font-size:0.88rem; color:#64748b; white-space:nowrap' }, '전체 진도'));
    overallRow.appendChild(renderProgressBar(overallPct));
    overallRow.appendChild(el('div', { style: 'font-weight:700; font-size:0.95rem; min-width:40px; text-align:right' }, `${overallPct}%`));
    card.appendChild(overallRow);

    if (state.units.length > 0) {
      const grid = el('div', { style: 'display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:8px' });
      state.units.forEach(unit => {
        const p = calcUnitProgress(stats.bestScores, unit);
        const pct = p ? p.pct : 0;
        const label = unit.title.replace(/^\d+(?:단원|단)?\s*[-·]\s*/, '') || unit.title;
        const chip = el('div', { style: 'background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:8px 10px' });
        chip.appendChild(el('div', { style: 'font-size:0.82rem; font-weight:600; color:#374151; margin-bottom:5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis' }, label));
        const chipBar = el('div', { style: 'background:#e2e8f0; border-radius:99px; height:6px; overflow:hidden; margin-bottom:3px' });
        chipBar.appendChild(el('div', { style: `background:${pct >= 80 ? '#10b981' : pct >= 50 ? '#3b82f6' : pct > 0 ? '#f59e0b' : '#cbd5e1'}; width:${pct}%; height:100%; border-radius:99px` }));
        chip.appendChild(chipBar);
        chip.appendChild(el('div', { style: 'font-size:0.78rem; color:#64748b' }, p ? `${p.done}/${p.total} (${pct}%)` : '활동 없음'));
        grid.appendChild(chip);
      });
      card.appendChild(grid);
    }

    if (stats.badges && stats.badges.length > 0) {
      const badgeNames = stats.badges.map(id => BADGE_NAMES[id] || id).join('  ');
      const badgeDiv = el('div', { style: 'margin-top:10px; font-size:0.82rem; color:#64748b; display:flex; align-items:center; gap:4px' });
      badgeDiv.appendChild(el('i', { 'data-lucide': 'award', style: 'width:14px; height:14px; color:#f59e0b;' }));
      badgeDiv.appendChild(document.createTextNode(badgeNames));
      card.appendChild(badgeDiv);
    }

    panel.appendChild(card);
  });

  root.appendChild(panel);
  return root;
}

function showTeacherModal(existing = null) {
  return new Promise(resolve => {
    const root = $('#modal-root');
    root.innerHTML = '';
    const backdrop = el('div', { class: 'modal-backdrop' });
    backdrop.onclick = (e) => { if (e.target === backdrop) { root.innerHTML = ''; resolve(false); }};
    const modal = el('div', { class: 'modal', style: 'max-width:440px' });
    modal.appendChild(el('h3', { style: 'margin-bottom:16px' }, existing ? '✏️ 교사 정보 수정' : '👩‍🏫 교사 추가'));

    const field = (label, input) => { modal.appendChild(el('label', { style: 'display:block; font-weight:600; font-size:0.9rem; margin-bottom:4px' }, label)); modal.appendChild(input); };

    const nameIn = el('input', { type: 'text', placeholder: '홍길동', style: 'width:100%; margin-bottom:12px' });
    if (existing) nameIn.value = existing.name;
    field('이름 *', nameIn);

    const phoneIn = el('input', { type: 'text', placeholder: '010-0000-0000', style: 'width:100%; margin-bottom:12px' });
    if (existing) phoneIn.value = existing.phone || '';
    field('연락처', phoneIn);

    const statusSel = el('select', { style: 'width:100%; margin-bottom:12px' });
    [['teaching', '🟢 수업진행중'], ['training', '🟡 교육중']].forEach(([v, l]) => {
      const opt = el('option', { value: v }, l);
      if (existing && existing.status === v) opt.setAttribute('selected', '');
      statusSel.appendChild(opt);
    });
    field('상태', statusSel);

    const noteIn = el('input', { type: 'text', placeholder: '담당 반, 특이사항 등', style: 'width:100%; margin-bottom:16px' });
    if (existing) noteIn.value = existing.note || '';
    field('메모', noteIn);

    const btns = el('div', { style: 'display:flex; gap:8px' });
    btns.appendChild(el('button', { class: 'btn btn-ghost', style: 'flex:1', onClick: () => { root.innerHTML = ''; resolve(false); }}, '취소'));
    btns.appendChild(el('button', { class: 'btn btn-primary', style: 'flex:1', onClick: async () => {
      const name = nameIn.value.trim();
      if (!name) { toast('이름을 입력하세요', 'danger'); return; }
      if (existing) {
        existing.name = name; existing.phone = phoneIn.value.trim();
        existing.status = statusSel.value; existing.note = noteIn.value.trim();
        await fbSaveTeacher(existing.id, { name: existing.name, phone: existing.phone, status: existing.status, note: existing.note });
      } else {
        toast('새 교사 등록은 회원가입 페이지를 이용하세요.', 'accent');
        root.innerHTML = ''; resolve(false); return;
      }
      root.innerHTML = ''; resolve(true); render();
    }}, existing ? '저장' : '추가'));
    modal.appendChild(btns);
    backdrop.appendChild(modal);
    root.appendChild(backdrop);
    setTimeout(() => nameIn.focus(), 50);
  });
}

function addXP(amount) {
  state.stats.xp += amount;
  const newLevel = Math.floor(state.stats.xp / 100) + 1;
  if (newLevel > state.stats.level) {
    state.stats.level = newLevel;
    toast(`🎉 레벨 UP! Level ${newLevel}`, 'accent');
  }
}
function checkBadges(ctx) {
  const newBadges = [];
  const has = b => state.stats.badges.includes(b);
  if (ctx.perfectScore && !has('perfect')) newBadges.push({ id: 'perfect', name: '완벽주의자' });
  if (ctx.streak >= 10 && !has('combo10')) newBadges.push({ id: 'combo10', name: '🔥 10연속' });
  if (state.stats.xp >= 500 && !has('xp500')) newBadges.push({ id: 'xp500', name: '⭐ XP 500' });
  if (state.stats.level >= 5 && !has('level5')) newBadges.push({ id: 'level5', name: '🏆 Lv.5 달성' });
  newBadges.forEach(b => state.stats.badges.push(b.id));
  return newBadges;
}
function recordBestScore(unitId, activity, score) {
  const key = `${unitId}_${activity}`;
  if (!state.stats.bestScores[key] || score > state.stats.bestScores[key]) state.stats.bestScores[key] = score;
}
function getBestScore(unitId, activity) { return state.stats.bestScores[`${unitId}_${activity}`] || 0; }
function calcStars(percent) { return percent >= 90 ? 3 : percent >= 70 ? 2 : percent >= 50 ? 1 : 0; }
